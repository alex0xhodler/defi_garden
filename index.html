<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

    <!-- Default title/meta for planner (bare /) — analytics pages set their own via JS -->
    <title>DeFi Garden 🌱 | Plan your DeFi savings by goal</title>
    <meta name="description" content="A goal-first DeFi savings planner. Tell us what you're saving for and how much you can set aside each month — we'll show what live, real pool rates could grow it into. Every number is live DefiLlama data. Education, not advice.">

    <!-- SEO Meta Tags -->
    <meta name="keywords" content="DeFi savings planner, goal-based saving, stablecoin yield, retirement DeFi, compound growth, yield farming, cryptocurrency, APY, DeFi Garden">
    <meta name="author" content="DeFi Garden">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://defigarden.app/">

    <!-- Multilingual SEO -->
    <link rel="alternate" hreflang="en" href="https://defigarden.app/">
    <link rel="alternate" hreflang="ko" href="https://defigarden.app/?lang=ko">
    <link rel="alternate" hreflang="x-default" href="https://defigarden.app/">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="DeFi Garden 🌱 | Plan Your DeFi Savings by Goal">
    <meta property="og:description" content="Tell us what you're saving for. We'll show what live, real DeFi pool rates could grow your monthly deposits into. Every number is live data — education, not advice.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://defigarden.app/">
    <meta property="og:site_name" content="DeFi Garden">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="DeFi Garden 🌱 | Plan Your DeFi Savings by Goal">
    <meta name="twitter:description" content="Tell us what you're saving for. We'll show what live, real DeFi pool rates could grow your monthly deposits into.">
    <meta name="twitter:creator" content="@defigarden">

    <!-- App Icons and Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🌱</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🌱</text></svg>">

    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#2D5A3D">
    <meta name="msapplication-TileColor" content="#2D5A3D">

    <!-- Performance: Preload critical resources -->
    <link rel="preload" href="./fonts/FKGroteskNeue.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="dns-prefetch" href="//unpkg.com">
    <link rel="dns-prefetch" href="//yields.llama.fi">

    <script>
        // IA Router — runs before React loads. Zero flash. Zero double-load.
        // ANALYTICS PARAMS: any of these mean "show the analytics app"
        // PLANNER PARAMS:   goal/monthly/years/pace/preset/fresh = planner
        // Bare /            = planner (new default per spec §7)
        (function () {
            var params = new URLSearchParams(window.location.search);
            var ANALYTICS_PARAMS = ['token', 'chain', 'pool', 'poolTypes', 'protocols', 'minTvl', 'minApy', 'app'];
            var needsAnalytics = ANALYTICS_PARAMS.some(function(k) { return params.has(k); });
            window.__APP_MODE = needsAnalytics ? 'analytics' : 'planner';

            // Apply saved theme before paint to avoid flash
            window.process = { env: {} };
            try {
                var saved = localStorage.getItem('theme');
                var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
            } catch (e) {}

            // Update canonical/OG if analytics mode
            if (needsAnalytics) {
                var canon = document.querySelector('link[rel="canonical"]');
                if (canon) canon.href = 'https://defigarden.app/' + (window.location.search || '');
                document.title = 'DeFi Garden 🌱 | Discover Highest Yield Farming Opportunities Across All Chains';
                var desc = document.querySelector('meta[name="description"]');
                if (desc) desc.content = 'Find the best DeFi yields for your tokens with DeFi Garden. Compare lending, staking, and LP rewards across 50+ protocols and all major chains. Real-time APY data from Defillama API.';
            }
        })();
    </script>

    <!-- Shared CSS (always loaded) -->
    <link rel="stylesheet" href="style.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="style.css"></noscript>

    <!-- Mode-conditional CSS: injected synchronously so it fetches in parallel -->
    <script>
        (function() {
            var mode = window.__APP_MODE;
            var head = document.head;
            function addCSS(href) {
                var l = document.createElement('link');
                l.rel = 'stylesheet'; l.href = href;
                l.media = 'print'; l.onload = function() { this.media = 'all'; };
                head.appendChild(l);
            }
            if (mode === 'analytics') { addCSS('pool-detail-styles.css'); }
            else { addCSS('planner-styles.css'); }
        })();
    </script>

    <!-- React UMD (shared, static defer — guaranteed order after HTML parse) -->
    <script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script defer crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script defer src="translations.js"></script>
    <script async defer data-website-id="9e56d1e1-f7c1-48fd-bb9d-e6b3e0ce2a3c" src="https://enhace.defi.garden/script.js"></script>

    <!-- Planner script — static defer so it runs after React + translations -->
    <script defer src="planner.js"></script>
</head>
<body>
    <!-- Root mounts for both experiences; only one gets populated per load -->
    <div id="root"></div>
    <div id="planner-root"></div>

    <!-- Analytics scripts — injected only when needed (Babel requires dynamic load) -->
    <script>
        if (window.__APP_MODE === 'analytics') {
            (function() {
                function addScript(src, type, onload) {
                    var s = document.createElement('script');
                    s.src = src;
                    if (type) s.setAttribute('type', type);
                    if (onload) s.onload = onload;
                    document.body.appendChild(s);
                }
                // Inject text/babel app scripts first so Babel can find them when it loads
                addScript('analytics.js');
                addScript('PoolDetail.js', 'text/babel');
                addScript('app.js', 'text/babel');
                // Babel is injected async, so it loads AFTER DOMContentLoaded has fired —
                // its auto-scan never runs. Transpile the injected text/babel scripts
                // explicitly once Babel is ready, so the analytics app actually mounts.
                addScript('https://unpkg.com/@babel/standalone/babel.min.js', null, function() {
                    if (window.Babel && Babel.transformScriptTags) Babel.transformScriptTags();
                });
            })();
        }
    </script>
</body>
</html>
